{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم — {{ company.company_name_ar|default:"باء البناء" }}</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'IBM Plex Sans Arabic', sans-serif; background: #1A1812; color: #FAF8F2; display: flex; align-items: center; justify-content: center; min-height: 100dvh; margin: 0; }
        .box { text-align: center; }
        h1 { color: #C8920A; font-size: 28px; margin-bottom: 8px; }
        p  { color: rgba(250,248,242,.55); margin-bottom: 24px; }
        a  { color: #E8B84A; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="box">
        <h1>مرحباً، {{ request.user.get_full_name|default:request.user.username }}</h1>
        <p>لوحة التحكم قيد الإنشاء</p>
        <a href="{% url 'employee_login' %}">تسجيل الخروج</a>
    </div>
</body>
</html>
